<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planer · DieDonuts Orga</title>
<link rel="stylesheet" href="css/portal.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="https://donuts-esports.de/assets/logo_trans.png" alt="DieDonuts"
      onerror="this.outerHTML='<span class=&quot;brand-fallback&quot;>DieDonuts</span>'">
    <span class="intern-tag">Orga</span>
  </div>
  <nav class="nav" id="sidebar-nav"></nav>
  <div class="sidebar-user">
    <div class="user-av">L</div>
    <div><div class="user-name">Lukas</div><div class="user-role">Owner · Pressesprecher</div></div>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Planer</div>
      <div class="page-sub">Aufgaben-Board · Verfügbarkeit der Spieler</div>
    </div>
  </div>

  <div class="strat-tabs">
    <button class="strat-tab active" data-tabgroup="pl" data-tabtarget="pl-tasks">📋 Aufgaben</button>
    <button class="strat-tab" data-tabgroup="pl" data-tabtarget="pl-avail">🗓 Verfügbarkeit</button>
  </div>

  <!-- AUFGABEN -->
  <div data-tabpanel="pl" id="pl-tasks">
    <div class="form-box">
      <div class="form-box-title">+ Neue Aufgabe</div>
      <form id="task-form">
        <div class="form-grid">
          <div class="fg"><label>Titel *</label><input name="title" required placeholder="z.B. ESEA-Anmeldung · Social-Media-Post · Server buchen"></div>
          <div class="fg"><label>Zuständig</label><select name="assignee"></select></div>
          <div class="fg"><label>Fällig bis</label><input name="due" type="date"></div>
          <div class="fg" style="grid-column:1/-1;"><label>Beschreibung</label><textarea name="desc" placeholder="Details, Links, Kontext..."></textarea></div>
        </div>
        <button type="submit" class="btn btn-primary">Aufgabe anlegen</button>
      </form>
    </div>
    <div class="kanban" id="kanban"></div>
  </div>

  <!-- VERFÜGBARKEIT -->
  <div data-tabpanel="pl" id="pl-avail" style="display:none;">
    <div class="form-box" style="margin-bottom:18px;">
      <div class="form-box-title">🏖 Urlaub / Abwesenheit eintragen</div>
      <form id="urlaub-form">
        <div class="form-grid">
          <div class="fg">
            <label>Spieler *</label>
            <select name="pid" id="urlaub-pid" required></select>
          </div>
          <div class="fg">
            <label>Von *</label>
            <input name="von" type="date" required>
          </div>
          <div class="fg">
            <label>Bis *</label>
            <input name="bis" type="date" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Abwesenheit speichern</button>
      </form>
    </div>
    <div class="card">
      <div class="card-title">Wer kann wann? (Scrims / Training)</div>
      <div id="avail-host"></div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/cloud.js"></script>
</body>
</html>
