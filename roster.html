<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster · DieDonuts Orga</title>
<link rel="stylesheet" href="css/portal.css">
</head>
<body>
<aside class="sidebar">

    <img src="https://donuts-esports.de/assets/logo_trans.png" alt="DieDonuts"

    <div class="user-av">L</div>

      <div class="user-name">Lukas (TubeYou)</div>
      <div class="user-role">Owner · Pressesprecher</div>
    </div>

    <div>
      <div class="page-title">Roster</div>
      <div class="page-sub">Teams · Spieler · Standins · CS2 DACH</div>

  <div id="roster-host"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>

<script src="js/faceit-config.js"></script>

<script>
  // Stats nachladen sobald Roster gerendert ist

    setTimeout(injectRosterStats, 600);
  });

<script src="js/cloud.js"></script>
